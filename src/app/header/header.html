<header class="w-full bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
  <!-- Top Logo Bar (Centered as shown in reference) -->
  <div class="w-full border-b border-gray-50 py-4 flex flex-col items-center justify-center bg-white">
    <a routerLink="/" class="flex flex-col items-center gap-1 group">
      <div class="flex items-center gap-2">
        <svg class="h-6 w-6 text-amber-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17m0-17L7 8m5-5l5 5m-5 12h5m-5 0H7m0 0a3 3 0 110-6 3 3 0 010 6zm10 0a3 3 0 110-6 3 3 0 010 6z" />
        </svg>
        <span class="text-xl font-bold tracking-[0.2em] text-gray-800 font-serif uppercase">VAKIL UNCLE</span>
      </div>
      <span class="text-[9px] uppercase tracking-[0.3em] text-amber-600 font-medium">Premium Law Firm & Advisors</span>
    </a>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-center">
    <nav class="hidden md:flex items-center gap-10">
      @for (item of navItems; track item.label) {
        @if (!item.dropdown) {
          <a [routerLink]="item.link"
             routerLinkActive="text-amber-600 font-semibold border-amber-600"
             [routerLinkActiveOptions]="{ exact: true }"
             class="text-xs uppercase tracking-widest font-semibold text-gray-600 hover:text-amber-600 transition-colors py-4 border-b-2 border-transparent">
            {{ item.label }}
          </a>
        } @else {
          <div class="relative">
            <button (click)="toggleDropdown(item.label, $event)"
                    class="flex items-center gap-1 text-xs uppercase tracking-widest font-semibold text-gray-600 hover:text-amber-600 focus:outline-none py-4 border-b-2 border-transparent">
              <span>{{ item.label }}</span>
              <svg class="h-3 w-3 transition-transform duration-200" [class.rotate-180]="activeDropdown() === item.label" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            @if (activeDropdown() === item.label) {
              <div class="absolute left-1/2 -translate-x-1/2 mt-1 w-48 rounded-md border border-gray-100 bg-white p-1 shadow-lg animate-in fade-in slide-in-from-top-1">
                @for (subItem of item.dropdown; track subItem.name) {
                  <a [routerLink]="subItem.route"
                     routerLinkActive="text-amber-600 bg-gray-50 font-semibold"
                     class="block rounded px-4 py-2 text-xs uppercase tracking-wider text-gray-600 hover:bg-gray-50 hover:text-amber-600 transition-colors">
                    {{ subItem.name }}
                  </a>
                }
              </div>
            }
          </div>
        }
      }
    </nav>
  </div>
</header>
